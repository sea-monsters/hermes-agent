name: mem-reflection-hermes
version: 0.5.0
description: "Self-evolving memory & reflection system ported from small-rust-hermes. Memory Palace with zone-based organization, effectiveness tracking with decay, palace navigation tools, TF-IDF search with effectiveness boosting, LLM-compiled profile generation, always-active skills, supersedes chains, micro/full reflection pipelines. v0.5: P0-P2 performance optimizations — async I/O, O(1) delete via id→path index, write-on-change palace index, fast byte-based token estimation, SkillStore lazy cache."
author: "ported from coder-brzhang/small-rust-hermes"
provides_tools:
  - srh_memory_search
  - srh_memory_write
  - srh_memory_delete
  - srh_skill_search
  - srh_reflect_now
  - srh_palace_zones
  - srh_palace_read_zone
  - srh_palace_recall
  - srh_compile_profile
provides_hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call
kind: standalone
