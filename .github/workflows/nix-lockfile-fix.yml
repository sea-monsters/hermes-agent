# Nix Lockfile Fix — DISABLED in the sea-monsters/hermes-agent fork.
#
# This workflow calls `nix run .#fix-lockfiles` to auto-update npm lockfile
# hashes in nix/lib.nix.  The upstream has this app configured in their
# flake, but our fork does not use Nix builds — we deliberately stripped
# the Nix npm helper functions from nix/lib.nix during the v0.18.0 merge.
#
# Keeping the file as a no-op avoids:
#   - CI failures from missing flake apps
#   - Confusing "missing attribute" errors in the Actions tab
#
# If Nix-based workflows are ever needed again, restore the full upstream
# version from upstream/main:.github/workflows/nix-lockfile-fix.yml.

name: Nix Lockfile Fix

on:
  push:
    branches: [main]
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'ui-tui/package.json'
      - 'apps/desktop/package.json'
  workflow_dispatch:
  issue_comment:
    types: [edited]

permissions:
  contents: read

jobs:
  skip:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "Nix Lockfile Fix disabled. Fork does not use Nix builds."
